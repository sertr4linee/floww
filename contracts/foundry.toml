[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
abstract_testnet = "https://api.testnet.abs.xyz"
abstract_mainnet = "https://api.mainnet.abs.xyz"
